        WH.initCanvas("viz",ctx=>{const membraneColor=WH.getColor("--surface-container-highest");const spawnParticle=(type,x,y)=>{return{type,x,y,vx:(Math.random()-.5)*100,vy:Math.random()*50+20,radius:type==="antagonist"?12:8,life:0}};const drawGlow=(x,y,color,radius)=>{const gradient=ctx.createRadialGradient(x,y,radius*.2,x,y,radius);gradient.addColorStop(0,WH.transparent(color,.8));gradient.addColorStop(1,WH.transparent(color,0));ctx.fillStyle=gradient;ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);ctx.fill()};
        
        return({ctx,width,height,time,dt,pointer,state})=>{ctx.clearRect(0,0,width,height);const minDim=Math.min(width,height);const membraneY=height-80;if(state.resetTrigger){state.receptors.a2a.bound=null;state.receptors.d2.bound=null;state.particles=[];state.resetTrigger=false}if(Math.random()<state.adenosineConc/2E3)state.particles.push(spawnParticle("adenosine",Math.random()*width,-20));if(Math.random()<state.dopamineConc/2E3)state.particles.push(spawnParticle("dopamine",Math.random()*width,-20));const antagCount=state.particles.filter(p=>p.type==="antagonist").length;if(state.antagonist&&antagCount===0&&state.receptors.a2a.bound!=="antagonist")state.particles.push(spawnParticle("antagonist",state.receptors.a2a.x*width,-50));const a2a=state.receptors.a2a;const d2=state.receptors.d2;const a2aX=a2a.x*width;const d2X=d2.x*width;const recY=membraneY-40;const recRadius=30;let d2IsLocked=a2a.bound==="adenosine";if(a2a.bound)if(a2a.bound==="antagonist"){if(!state.antagonist)a2a.bound=null}else{a2a.timer-=dt;if(a2a.timer<=0)a2a.bound=null}if(d2.bound){d2.timer-=dt;if(d2IsLocked||d2.timer<=0){d2.bound=null;state.ripples.push({x:d2X,y:recY,r:10,life:1})}}ctx.fillStyle=membraneColor;ctx.fillRect(0,membraneY,width,height-membraneY);ctx.beginPath();ctx.moveTo(a2aX,recY+20);ctx.lineTo(d2X,recY+20);ctx.lineWidth=15;ctx.strokeStyle=WH.getColor("--outline");ctx.stroke();if(d2IsLocked){ctx.strokeStyle=WH.getColor("--chart-4");ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(a2aX+30,recY);ctx.lineTo((a2aX+d2X)/2,recY-30);ctx.lineTo(d2X-20,recY);ctx.stroke();ctx.fillStyle=WH.getColor("--chart-4");ctx.beginPath();ctx.arc((a2aX+d2X)/2,recY-30,10,0,Math.PI*2);ctx.fill()}for(let i=state.particles.length-1;i>=0;i--){let p=state.particles[i];p.y+=p.vy*dt;p.x+=p.vx*dt;if(p.x<0||p.x>width)p.vx*=-1;if(p.y>membraneY-p.radius){p.y=membraneY-p.radius;p.vy*=-.5;p.vx*=.8}const distA2A=Math.hypot(p.x-a2aX,p.y-recY);if(!a2a.bound&&distA2A<60){p.vx+=(a2aX-p.x)*2*dt;p.vy+=(recY-p.y)*2*dt;if(distA2A<20)if(p.type==="adenosine"){a2a.bound="adenosine";a2a.timer=BIND_DURATION;state.particles.splice(i,1);continue}else if(p.type==="antagonist"){a2a.bound="antagonist";state.particles.splice(i,1);continue}}else if(a2a.bound&&distA2A<40)if(a2a.bound==="adenosine"&&p.type==="adenosine"||a2a.bound==="antagonist"&&p.type==="antagonist"){p.vx=(p.x-a2aX)*5;p.vy=-50}const distD2=Math.hypot(p.x-d2X,p.y-recY);if(!d2.bound&&p.type==="dopamine"&&distD2<60)if(d2IsLocked){if(distD2<35){p.vy=-Math.abs(p.vy)-100;p.vx=(Math.random()-.5)*200;state.ripples.push({x:d2X,y:recY-20,r:10,life:.5,color:"--chart-4"})}}else{p.vx+=(d2X-p.x)*5*dt;p.vy+=(recY-p.y)*5*dt;if(distD2<20){d2.bound="dopamine";d2.timer=BIND_DURATION;state.particles.splice(i,1);continue}}if(p.y>height+10||p.y<-100)state.particles.splice(i,1)}ctx.fillStyle=WH.getColor(a2a.bound==="antagonist"?"--chart-2":"--surface-container");ctx.strokeStyle=WH.getColor("--on-surface-default");ctx.lineWidth=3;ctx.beginPath();ctx.arc(a2aX,recY,recRadius,0,Math.PI,false);ctx.fill();ctx.stroke();ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle=WH.getColor("--on-surface-default");ctx.font="16px sans-serif";ctx.fillText("A2A",a2aX,recY+15);if(a2a.bound)if(a2a.bound==="adenosine"){ctx.fillStyle=WH.getColor("--chart-4");ctx.beginPath();ctx.arc(a2aX,recY-10,15,0,Math.PI*2);ctx.fill();ctx.fillStyle="white";ctx.fillText("A",a2aX,recY-10);drawGlow(a2aX,recY,"--chart-4",50)}else if(a2a.bound==="antagonist"){ctx.fillStyle=WH.getColor("--chart-2");ctx.fillRect(a2aX-15,recY-25,30,30);ctx.fillStyle="black";ctx.fillText("X",a2aX,recY-10)}ctx.fillStyle=WH.getColor(d2.bound?"--primary":"--surface-container");ctx.strokeStyle=WH.getColor(d2IsLocked?"--chart-4":"--primary");ctx.beginPath();if(d2IsLocked){ctx.moveTo(d2X-25,recY-10);ctx.lineTo(d2X,recY+20);ctx.lineTo(d2X+25,recY-10);ctx.lineTo(d2X,recY)}else ctx.arc(d2X,recY,recRadius,0,Math.PI,false);ctx.fill();ctx.stroke();ctx.fillStyle=WH.getColor("--on-surface-default");ctx.fillText("D2",d2X,recY+15);if(d2.bound){ctx.fillStyle=WH.getColor("--primary");ctx.beginPath();ctx.arc(d2X,recY-5,12,0,Math.PI*2);ctx.fill();ctx.fillStyle="white";ctx.fillText("D",d2X,recY-5);drawGlow(d2X,recY,"--primary",60);ctx.strokeStyle=WH.getColor("--chart-3");ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(d2X,recY+30);ctx.lineTo(d2X-10,recY+50);ctx.lineTo(d2X+10,recY+60);ctx.lineTo(d2X,recY+80);ctx.stroke()}else if(d2IsLocked){ctx.strokeStyle=WH.getColor("--chart-4");ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(d2X-10,recY-40);ctx.lineTo(d2X+10,recY-20);ctx.moveTo(d2X+10,recY-40);ctx.lineTo(d2X-10,recY-20);ctx.stroke()}state.particles.forEach(p=>{ctx.fillStyle=WH.getColor(p.type==="adenosine"?"--chart-4":p.type==="dopamine"?"--primary":"--chart-2");ctx.beginPath();if(p.type==="antagonist")ctx.fillRect(p.x-6,p.y-6,12,12);else{ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill()}});ctx.lineWidth=2;for(let i=state.ripples.length-1;i>=0;i--){const r=state.ripples[i];r.life-=dt;r.r+=dt*30;ctx.strokeStyle=WH.transparent(r.color||"--on-surface-default",r.life);ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();if(r.life<=0)state.ripples.splice(i,1)}const d2Status=d2IsLocked?"Low Affinity (Brake On)":"High Affinity (Active)";const signal=d2.bound?"Firing (100%)":"Silent (0%)";ui.setHUD([{label:"A2A State",value:a2a.bound?a2a.bound==="adenosine"?"Bound (Adenosine)":"Blocked (Antagonist)":"Empty"},{label:"D2 Receptor",value:d2Status},{label:"Signal Output",value:signal}])}});
    </script>
